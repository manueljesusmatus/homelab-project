services:
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    hostname: watchtower
    security_opt:
      - no-new-privileges=true
    volumes:
      - ${ROOT_DATA_DIR}/watchtower/log:/var/log/watchtower
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      DOCKER_API_VERSION: ${DOCKER_API_VERSION}
      # FLAGS
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      # METRICS API (no desactiva el scheduler; solo HTTP_API_UPDATE lo haría)
      WATCHTOWER_HTTP_API_METRICS: "true"
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_API_TOKEN}
      # SCHEDULE
      WATCHTOWER_SCHEDULE: "0 0 1 * * 6"
      WATCHTOWER_TIMEOUT: 30s
      # DEBUGGING
      WATCHTOWER_LOG_FORMAT: "pretty"
      WATCHTOWER_LOG_LEVEL: "debug"
      # NOTIFICATIONS
      WATCHTOWER_NOTIFICATIONS: email
      WATCHTOWER_NOTIFICATION_EMAIL_FROM: ${WATCHTOWER_EMAIL_FROM}
      WATCHTOWER_NOTIFICATION_EMAIL_TO: ${WATCHTOWER_EMAIL_TO}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER: ${WATCHTOWER_EMAIL_SERVER}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT: 587
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_TLS_SKIP_VERIFY: "false"
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER: ${WATCHTOWER_EMAIL_USER}
      WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD: ${WATCHTOWER_EMAIL_PASSWORD}
    labels:
      # TRAEFIK
      - "traefik.enable=true"
      - "traefik.http.routers.watchtower.rule=Host(`${WATCHTOWER_DOMAIN}`)"
      - "traefik.http.routers.watchtower.entrypoints=websecure"
      - "traefik.http.routers.watchtower.tls.certresolver=cloudflare"
      - "traefik.http.services.watchtower.loadbalancer.server.port=8080"
      # GLANCE
      - "glance.name=watchtower"
      - "glance.icon=di:watchtower"
      - "glance.url=https://${WATCHTOWER_DOMAIN}"
    networks:
      - traefik_net
    restart: unless-stopped

networks:
  traefik_net:
    external: true