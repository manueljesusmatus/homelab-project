# stacks/docker.yml

- name: Instalar Docker si no está presente
  become: yes
  ansible.builtin.shell:
    cmd: curl -fsSL https://get.docker.com | sh
    creates: /usr/bin/docker

- name: Actualizar los paquetes APT
  become: yes
  apt:
    update_cache: yes

- name: Asegurarse de que el servicio Docker esté en ejecución
  service:
    name: docker
    state: started
    enabled: yes

- name: Añadir el usuario al grupo docker
  become: yes
  user:
    name: "{{ ANSIBLE_USER }}"
    groups: docker
    append: yes

- name: Verificar que Docker se puede ejecutar sin sudo
  command: docker --version
  register: docker_version
  changed_when: false

- name: Mostrar versión de Docker instalada
  debug:
    msg: "Docker versión: {{ docker_version.stdout }}"

- name: Crear red Docker traefik_net
  become: yes
  community.docker.docker_network:
    name: traefik_net
    state: present
    ipam_config:
      - subnet: 172.21.0.0/24