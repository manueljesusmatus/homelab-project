- name: Sin cambios
  debug:
    msg: "Sin cambios - servicios ya activos"
  when: not result.changed

- name: Cambios aplicados
  debug:
    msg: |
      Cambios:
      {% for action in result.actions %}
        - {{ action.id }}: {{ action.status }} {{ action.what }}
      {% endfor %}
  when: result.changed
