---
- name: Desplegar contenedores en lab principal
  hosts: localhost
  become: yes
  vars:
    disabled_stacks:
      - artifactory
      - cloudbeaver
      - gitea
      - jenkins
      - monitoreo
      - navidrome
      - redis
    stacks:
      - traefik-proxy
      - portainer
      - watchtower
      - homarr
      - uptimekuma
      - microbin
      - syncthing
  handlers:
    - name: Reiniciar casaos-gateway
      systemd:
        name: casaos-gateway.service
        state: restarted

  tasks:
    - name: Agregar al grupo sudoers
      import_tasks: "stacks/docker.yml"
      tags:
        - init
    
    - name: Setup inicial
      import_tasks: "stacks/config.yml"
      tags:
        - init

    - name: Instalar CasaOS
      import_tasks: "stacks/casaos.yml"
      tags:
        - init

    # Esta task siempre debe ser la última del bloque de init
    # ya que reinicia el servicio y es necesario para que los cambios anteriores tengan efecto
    - name: Habilitar cgroups de memoria para RAM tracking
      ansible.builtin.lineinfile:
        path: /boot/firmware/cmdline.txt
        backrefs: yes
        regexp: '^((?!.*cgroup_memory=1).+)$'
        line: '\1 cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1'
      tags:
        - init

    - name: Detener servicios con Docker Compose en múltiples carpetas
      shell: "docker-compose -f {{ ROOT_DATA_DIR }}/homelab-project/docker/{{ item }}/docker-compose.yml down"
      loop: "{{ stacks }}"
      when: item not in disabled_stacks
      tags:
        - down

    - name: Ejecutar playbook de cada stack
      include_tasks: "stacks/{{ item }}.yml"
      loop: "{{ stacks }}"
      when: item not in disabled_stacks
      tags:
        - up
